<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta charset="UTF-8">
  <title>Chat Rooms</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #f9f9f9;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      height: 100%;
      width: 100%;
      max-width: 600px;
      margin: auto;
    }

    /* Auth (Login/Register) */
    #auth {
      text-align: center;
      padding: 20px;
      flex: 1;
    }

    .login-register input,
    .login-register button {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      font-size: 1em;
      border: 1px solid #ccc;
    }

    .login-register button {
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
    }

    .login-register button:hover {
      background-color: #45a049;
    }

    .login-register #auth-error {
      color: red;
      margin-top: 10px;
    }

    /* Room Selection */
    #room-selection {
      text-align: center;
      flex: 1;
      padding: 20px;
    }

    /* Chat Room */
    #chat {
      display: flex;
      flex-direction: column;
      height: 100%;
      bottom:0;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #333;
      color: white;
      padding: 10px;
    }

    .header h3 {
      margin: 0;
      font-size: 1.2em;
    }

    /* Messages List */
    .messages {
      flex: 1;
      overflow-y: auto; /* Enable scrolling */
      padding: 10px;
      background-color: #f9f9f9;
      margin-bottom: 10px; /* Space for the input area */
    }

    .message {
      padding: 14px 18px;
      margin: 8px 0;
      max-width: 75%;
      border-radius: 20px;
      line-height: 1.6;
      word-wrap: break-word;
      position: relative;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
      transition: all 0.3s ease;
    }

    .sent {
      align-self: flex-end;
      background-color: lightblue;
      color: black;
    }

    .received {
      align-self: flex-start;
      background-color: #e0e0e0;
      color: black;
    }

    /* Input Area (Message Box) */
    .input-area {
      padding: 10px;
      background-color: #fff;
      border-top: 1px solid #ccc;
      bottom:0;
      justify-content: space-between;
      align-items: center;
    }

    #message-input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    #send-button {
      padding: 10px 15px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 10px;
    }

    #send-button:hover {
      background-color: #45a049;
    }

    /* Back to Room Selector Button */
    #back-to-selector-button {
      background-color: lightblue;
      color: black;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      z-index: 1000;
      margin-top: 10px;
      margin-left: 10px;
    }

    #back-to-selector-button:hover {
      background-color: #ff2a3e;
    }

    /* Logout Button */
    #logout-button {
      background-color: red;
      color: white;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      z-index: 1000;
    }

    #logout-button:hover {
      background-color: darkred;
    }

    /* Error Messages */
    #room-error, #auth-error {
      color: red;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Authentication Section (Login/Register) -->
    <div id="auth">
      <div class="login-register">
        <h2>Login to Chat</h2>
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Password" />
        <button id="login">Login</button>
        <button id="forgot-password">Forgot Password?</button>
        <button id="register">Register</button>
        <div id="auth-error"></div>
      </div>
    </div>

    <!-- Room Selection -->
    <div id="room-selection" style="display: none;">
      <div class="login-register">
        <h2>Join / Create Room</h2>
        <input type="text" id="room-name" placeholder="Enter room name" />
        <button id="join-room">Join Room</button>
        <button id="create-room">Create Room</button>
        <div id="room-error"></div>
      </div>
    </div>

    <!-- Chat Room -->
    <div id="chat" style="display: none;">
      <div class="header">
        <h3 id="room-name-header">Room Name</h3>
        <button id="logout-button">Logout</button>
      </div>
      <div class="messages" id="message-list"></div>
      <div id="typing-indicator" style="display: none;">Someone is typing...</div>
      <div class="input-area">
        <input type="text" id="message-input" placeholder="Type your message..." />
        <button id="send-button">Go</button>
      </div>
      <button id="back-to-selector-button">Back to Room Selector</button>
    </div>
  </div>

  <script type="module">
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAC49cgzmUZjqRM1akkEJmIOLz_NKBCC5k",
      authDomain: "adiasta-686e4.firebaseapp.com",
      databaseURL: "https://adiasta-686e4-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "adiasta-686e4",
      storageBucket: "adiasta-686e4.appspot.com",
      messagingSenderId: "822931467224",
      appId: "1:822931467224:web:46f81b5779491efe6260ad",
      measurementId: "G-68996BGLFE",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const database = getDatabase();

    const authContainer = document.getElementById("auth");
    const roomSelection = document.getElementById("room-selection");
    const chatContainer = document.getElementById("chat");
    const loginButton = document.getElementById("login");
    const registerButton = document.getElementById("register");
    const joinRoomButton = document.getElementById("join-room");
    const createRoomButton = document.getElementById("create-room");
    const roomNameInput = document.getElementById("room-name");
    const authError = document.getElementById("auth-error");
    const roomError = document.getElementById("room-error");
    const messagesDiv = document.getElementById("message-list");
    const sendButton = document.getElementById("send-button");
    const messageInput = document.getElementById("message-input");
    const logoutButton = document.getElementById("logout-button");
    const roomNameHeader = document.getElementById("room-name-header");
    const backToSelectorButton = document.getElementById("back-to-selector-button");
    const typingIndicator = document.getElementById("typing-indicator");

    let currentRoom = null;
    let currentUsername = null;

    loginButton.addEventListener("click", function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          currentUsername = userCredential.user.email;
          authContainer.style.display = "none";
          roomSelection.style.display = "block";
        })
        .catch((error) => {
          authError.innerText = "Login failed: " + error.message;
        });
    });

    registerButton.addEventListener("click", function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          currentUsername = userCredential.user.email;
          authContainer.style.display = "none";
          roomSelection.style.display = "block";
        })
        .catch((error) => {
          authError.innerText = "Registration failed: " + error.message;
        });
    });

    // Join Room
    joinRoomButton.addEventListener("click", function() {
      const roomName = roomNameInput.value;
      if (roomName) {
        currentRoom = roomName;
        roomNameHeader.innerText = roomName;
        roomSelection.style.display = "none";
        chatContainer.style.display = "block";
        loadMessages();
      } else {
        roomError.innerText = "Please enter a room name!";
      }
    });

    // Create Room
    createRoomButton.addEventListener("click", function() {
      const roomName = roomNameInput.value;
      if (roomName) {
        currentRoom = roomName;
        roomNameHeader.innerText = roomName;
        roomSelection.style.display = "none";
        chatContainer.style.display = "block";
        loadMessages();
      } else {
        roomError.innerText = "Please enter a room name!";
      }
    });

    // Send Message
    sendButton.addEventListener("click", function() {
      const message = messageInput.value;
      if (message.trim() !== "") {
        const messageRef = ref(database, `rooms/${currentRoom}/messages`);
        const newMessage = {
          username: currentUsername,
          text: message,
          timestamp: Date.now(),
        };
        push(messageRef, newMessage);
        messageInput.value = "";
      }
    });

    // Back to Room Selector
    backToSelectorButton.addEventListener("click", function() {
      roomSelection.style.display = "block";
      chatContainer.style.display = "none";
      currentRoom = null;
      roomNameHeader.innerText = "";
    });

    // Load Messages
    function loadMessages() {
      const messagesRef = ref(database, `rooms/${currentRoom}/messages`);
      messagesDiv.innerHTML = "";

      onValue(messagesRef, (snapshot) => {
        const messages = snapshot.val();
        if (messages) {
          messagesDiv.innerHTML = "";
          for (let id in messages) {
            const message = messages[id];
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message");
            messageDiv.classList.add(message.username === currentUsername ? "sent" : "received");
            messageDiv.id = `message-${id}`;
            messageDiv.innerHTML = `
              <strong>${message.username}:</strong> ${message.text}
              <div style="font-size: 0.8em; color: gray;">${new Date(message.timestamp).toLocaleTimeString()}</div>
            `;
            messagesDiv.appendChild(messageDiv);
          }
          // Scroll to the bottom
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
      });
    }
    logoutButton.addEventListener("click", function() {
      signOut(auth).then(() => {
        authContainer.style.display = "block";
        chatContainer.style.display = "none";
        roomSelection.style.display = "none";
        currentRoom = null;
        roomNameHeader.innerText = "";
      }).catch((error) => {
        console.log("Error logging out:", error);
      });
    });
  </script>
</body>
</html>
