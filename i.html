<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta charset="UTF-8">
  <title>Chat Rooms</title>
  <style>
    /* Global Styles */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      background-color: #f9f9f9;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      height: 100%;
      width: 100%;
      max-width: 600px;
      margin: auto;
    }

    /* Auth (Login/Register) */
    #auth {
      text-align: center;
      padding: 20px;
      flex: 1;
    }

    .login-register input,
    .login-register button {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      font-size: 1em;
      border: 1px solid #ccc;
    }

    .login-register button {
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
    }

    .login-register button:hover {
      background-color: #45a049;
    }

    .login-register #auth-error {
      color: red;
      margin-top: 10px;
    }

    /* Room Selection */
    #room-selection {
      text-align: center;
      flex: 1;
      padding: 20px;
    }

    /* Chat Room */
    #chat {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .header {
      background-color: #f0f0f0;
      padding: 15px;
      text-align: center;
      flex: 0 1 50px; /* Ensure the header takes up minimal space */
    }

    .header h3 {
      margin: 0;
      font-size: 1.5em;
      color: #333;
    }

    .messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background-color: #fff;
    }

    .message {
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      background-color: #f1f1f1;
    }

    .sent {
      background-color: #e1ffe1;
      text-align: right;
    }

    .received {
      background-color: #e0e0e0;
      text-align: left;
    }

    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px;
      background-color: #fff;
      border-top: 1px solid #ddd;
      box-sizing: border-box;
    }

    .input-area input {
      width: 80%;
      padding: 12px;
      border-radius: 25px;
      border: 1px solid #ddd;
      font-size: 1em;
      outline: none;
    }

    .input-area button {
      padding: 12px;
      background-color: #4CAF50;
      border-radius: 50%;
      border: none;
      font-size: 1.2em;
      cursor: pointer;
      color: white;
      margin-left: 10px;
    }

    .input-area button:hover {
      background-color: #45a049;
    }

    /* Error Message */
    #room-error,
    #auth-error {
      color: red;
      font-size: 0.9em;
    }

    /* Logout Button */
    #logout-button {
      position: fixed;
      top: 15px;
      right: 15px;
      background-color: red;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      z-index: 100;
    }

    #logout-button:hover {
      background-color: darkred;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="auth">
      <div class="login-register">
        <h2>Login to Chat</h2>
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Password" />
        <button id="login">Login</button>
        <button id="forgot-password">Forgot Password?</button>
        <button id="register">Register</button>
        <div id="auth-error"></div>
      </div>
    </div>

    <!-- Room Selection -->
    <div id="room-selection" style="display: none;">
      <div class="login-register">
        <h2>Join / Create Room</h2>
        <input type="text" id="room-name" placeholder="Enter room name" />
        <button id="join-room">Join Room</button>
        <button id="create-room">Create Room</button>
        <div id="room-error"></div>
      </div>
    </div>

    <!-- Chat Room -->
    <div id="chat" style="display: none;">
      <div class="header">
        <h3 id="room-name-header">Room Name</h3>
      </div>
      <div class="messages" id="message-list"></div>
      <div id="typing-indicator" style="display: none;">Someone is typing...</div>
      <div class="input-area">
        <input type="text" id="message-input" placeholder="Type your message..." />
        <button id="send-button">Send</button>
      </div>
    </div>
  </div>

  <!-- Logout Button -->
  <button id="logout-button" style="display: none;">Logout</button>

  <script type="module">
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAC49cgzmUZjqRM1akkEJmIOLz_NKBCC5k",
      authDomain: "adiasta-686e4.firebaseapp.com",
      databaseURL: "https://adiasta-686e4-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "adiasta-686e4",
      storageBucket: "adiasta-686e4.appspot.com",
      messagingSenderId: "822931467224",
      appId: "1:822931467224:web:46f81b5779491efe6260ad",
      measurementId: "G-68996BGLFE",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const database = getDatabase();

    const authContainer = document.getElementById("auth");
    const roomSelection = document.getElementById("room-selection");
    const chatContainer = document.getElementById("chat");
    const loginButton = document.getElementById("login");
    const registerButton = document.getElementById("register");
    const joinRoomButton = document.getElementById("join-room");
    const createRoomButton = document.getElementById("create-room");
    const roomNameInput = document.getElementById("room-name");
    const authError = document.getElementById("auth-error");
    const roomError = document.getElementById("room-error");
    const messagesDiv = document.getElementById("message-list");
    const sendButton = document.getElementById("send-button");
    const messageInput = document.getElementById("message-input");
    const logoutButton = document.getElementById("logout-button");
    const roomNameHeader = document.getElementById("room-name-header");

    let currentRoom = null;
    let currentUsername = null;

    const savedUser = localStorage.getItem("loggedInUser");
    if (savedUser) {
      const { uid, username } = JSON.parse(savedUser);
      currentUsername = username;
      showRoomSelection();
    }

    function displayError(element, message) {
      element.textContent = message;
      element.style.color = "red";
      setTimeout(() => (element.textContent = ""), 3000);
    }

    function showRoomSelection() {
      authContainer.style.display = "none";
      roomSelection.style.display = "block";
    }

    function showChat() {
      roomSelection.style.display = "none";
      chatContainer.style.display = "flex";
      roomNameHeader.textContent = currentRoom;
      loadMessages();
    }

    loginButton.addEventListener("click", () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          currentUsername = user.email.split("@")[0];
          localStorage.setItem(
            "loggedInUser",
            JSON.stringify({ uid: user.uid, username: currentUsername })
          );
          showRoomSelection();
        })
        .catch((error) => displayError(authError, error.message));
    });

    registerButton.addEventListener("click", () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          currentUsername = user.email.split("@")[0];
          localStorage.setItem(
            "loggedInUser",
            JSON.stringify({ uid: user.uid, username: currentUsername })
          );
          showRoomSelection();
        })
        .catch((error) => displayError(authError, error.message));
    });

    function joinOrCreateRoom(action) {
      const roomName = roomNameInput.value.trim();
      if (roomName) {
        currentRoom = roomName;
        const roomRef = ref(database, `rooms/${roomName}`);
        if (action === "create") {
          set(roomRef, { createdAt: Date.now() }).then(() => showChat());
        } else {
          onValue(roomRef, (snapshot) => {
            if (snapshot.exists()) {
              showChat();
            } else {
              displayError(roomError, "Room does not exist. Try creating it.");
            }
          });
        }
      } else {
        displayError(roomError, "Room name cannot be empty.");
      }
    }

    joinRoomButton.addEventListener("click", () => joinOrCreateRoom("join"));
    createRoomButton.addEventListener("click", () => joinOrCreateRoom("create"));

    function loadMessages() {
      const messagesRef = ref(database, `rooms/${currentRoom}/messages`);
      messagesDiv.innerHTML = "";

      onValue(messagesRef, (snapshot) => {
        const messages = snapshot.val();
        if (messages) {
          messagesDiv.innerHTML = "";
          for (let id in messages) {
            const message = messages[id];
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message");
            messageDiv.classList.add(message.username === currentUsername ? "sent" : "received");
            messageDiv.id = `message-${id}`;
            messageDiv.innerHTML = `
              <strong>${message.username}:</strong> ${message.text}
              <div style="font-size: 0.8em; color: gray;">${new Date(message.timestamp).toLocaleTimeString()}</div>
            `;
            messagesDiv.appendChild(messageDiv);
          }
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
      });
    }

    sendButton.addEventListener("click", () => {
      const text = messageInput.value.trim();
      if (text) {
        push(ref(database, `rooms/${currentRoom}/messages`), {
          username: currentUsername,
          text: text,
          timestamp: Date.now(),
        });
        messageInput.value = "";
      }
    });

    logoutButton.addEventListener("click", () => {
      signOut(auth).then(() => {
        localStorage.removeItem("loggedInUser");
        location.reload();
      });
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUsername = user.email.split("@")[0];
        showRoomSelection();
      }
    });

    messageInput.addEventListener("keypress", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendButton.click();
      }
    });
  </script>
</body>
</html>
